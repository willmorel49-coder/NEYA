<body>
  <div id="root"></div>
  <script>
    // V24 unstuck — désinscrit les vieux Service Workers + purge caches images
    // (notamment ancien cache /covers/ qui empechait les nouvelles pochettes).
    // Une seule fois par session, reload automatique.
    (function () {
      try {
        if (localStorage.getItem('cava_unstuck_v27_rebrand')) return;
        if (!('serviceWorker' in navigator)) return;
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          var unregisterAll = (regs && regs.length)
            ? Promise.all(regs.map(function (r) { return r.unregister(); }))
            : Promise.resolve();
          unregisterAll.then(function () {
            var purge = ('caches' in window)
              ? caches.keys().then(function (keys) {
                  return Promise.all(keys.map(function (k) { return caches.delete(k); }));
                })
              : Promise.resolve();
            purge.then(function () {
              localStorage.setItem('cava_unstuck_v27_rebrand', '1');
              location.reload();
            });
          });
        });
      } catch (e) {}
    })();
  </script>
  <script type="module" src="/src/main.jsx"></script>
