<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 380" fill="none">
  <defs>
    <!-- Lueur douce de l'esprit -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Gradient corps -->
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(180,210,255,0.25)"/>
      <stop offset="60%" stop-color="rgba(140,180,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(100,150,255,0.05)"/>
    </linearGradient>
    <!-- Gradient bois -->
    <linearGradient id="boisGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="rgba(180,220,255,0.5)"/>
      <stop offset="100%" stop-color="rgba(200,230,255,0.08)"/>
    </linearGradient>
  </defs>

  <!-- Corps principal — silhouette éthérée -->
  <ellipse cx="120" cy="230" rx="42" ry="62"
    fill="url(#bodyGrad)"
    stroke="rgba(180,215,255,0.22)"
    stroke-width="1"
    filter="url(#glow)"
  />

  <!-- Cou -->
  <path d="M105 170 Q112 148 120 135 Q128 148 135 170"
    fill="rgba(160,200,255,0.12)"
    stroke="rgba(180,215,255,0.20)"
    stroke-width="1"
    filter="url(#glow)"
  />

  <!-- Tête -->
  <ellipse cx="120" cy="122" rx="20" ry="16"
    fill="rgba(170,210,255,0.15)"
    stroke="rgba(190,220,255,0.22)"
    stroke-width="1"
    filter="url(#glow)"
  />

  <!-- Museau discret -->
  <ellipse cx="120" cy="133" rx="8" ry="5"
    fill="rgba(160,200,255,0.08)"
    stroke="rgba(180,215,255,0.12)"
    stroke-width="0.8"
  />

  <!-- Bois gauche — ramure complexe et lumineuse -->
  <g filter="url(#glow)" stroke="url(#boisGrad)" stroke-linecap="round" fill="none">
    <!-- Tige principale gauche -->
    <path d="M106 110 Q96 88 88 68 Q82 52 78 35" stroke-width="1.8"/>
    <!-- Branche 1G -->
    <path d="M91 80 Q80 68 72 58 Q65 50 60 42" stroke-width="1.3"/>
    <!-- Branche 2G -->
    <path d="M86 62 Q82 50 80 40 Q79 32 80 22" stroke-width="1.0"/>
    <!-- Pointe extrême G -->
    <path d="M80 35 Q74 25 70 16" stroke-width="0.8"/>
    <path d="M78 35 Q84 24 86 14" stroke-width="0.8"/>
    <!-- Andouiller G -->
    <path d="M88 68 Q82 62 76 60 Q70 58 64 60" stroke-width="0.8"/>
  </g>

  <!-- Bois droit — ramure miroir -->
  <g filter="url(#glow)" stroke="url(#boisGrad)" stroke-linecap="round" fill="none">
    <!-- Tige principale droite -->
    <path d="M134 110 Q144 88 152 68 Q158 52 162 35" stroke-width="1.8"/>
    <!-- Branche 1D -->
    <path d="M149 80 Q160 68 168 58 Q175 50 180 42" stroke-width="1.3"/>
    <!-- Branche 2D -->
    <path d="M154 62 Q158 50 160 40 Q161 32 160 22" stroke-width="1.0"/>
    <!-- Pointe extrême D -->
    <path d="M162 35 Q168 25 172 16" stroke-width="0.8"/>
    <path d="M162 35 Q156 24 154 14" stroke-width="0.8"/>
    <!-- Andouiller D -->
    <path d="M152 68 Q158 62 164 60 Q170 58 176 60" stroke-width="0.8"/>
  </g>

  <!-- Pattes avant — légères, presque immatérielles -->
  <g stroke="rgba(160,200,255,0.18)" stroke-width="5" stroke-linecap="round" fill="none" filter="url(#glow)">
    <line x1="104" y1="282" x2="100" y2="340"/>
    <line x1="136" y1="282" x2="140" y2="340"/>
  </g>

  <!-- Pattes arrière — encore plus légères -->
  <g stroke="rgba(140,185,255,0.12)" stroke-width="4" stroke-linecap="round" fill="none">
    <line x1="98" y1="286" x2="93" y2="345"/>
    <line x1="142" y1="286" x2="147" y2="345"/>
  </g>

  <!-- Points de lumière — particules sur le corps -->
  <g fill="rgba(210,230,255,0.6)" filter="url(#glowStrong)">
    <circle cx="116" cy="195" r="1.2"/>
    <circle cx="126" cy="215" r="0.9"/>
    <circle cx="112" cy="228" r="1.0"/>
    <circle cx="132" cy="205" r="0.8"/>
    <circle cx="120" cy="248" r="1.1"/>
  </g>

  <!-- Lueur centrale douce — l'âme de l'animal -->
  <ellipse cx="120" cy="210" rx="28" ry="40"
    fill="rgba(150,190,255,0.06)"
    filter="url(#glowStrong)"
  />
</svg>
